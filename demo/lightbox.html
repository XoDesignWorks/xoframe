<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>XOlightbox — native dialog + View Transitions</title>
  <link rel="stylesheet" href="../packages/core/dist/xoframe.css">
  <link rel="stylesheet" href="demo.css">
  <style>
    .thumbs { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; }
    .thumbs a { display: block; border-radius: 8px; overflow: hidden; cursor: zoom-in; }
    .thumbs img { width: 100%; height: 140px; object-fit: cover; display: block; }
  </style>
</head>
<body>
  <header class="site"><h1><a href="index.html">XOframe</a></h1><span>XOlightbox — 2.1&nbsp;KB vs ~50&nbsp;KB Fancybox</span></header>
  <main>
    <h2>Click any image</h2>
    <p class="note">Built on the native <code>&lt;dialog&gt;</code> (free focus trap, Esc, backdrop,
    aria-modal) and the View Transitions API for a smooth zoom. Keyboard: <kbd>Esc</kbd> to close,
    <kbd>←</kbd>/<kbd>→</kbd> to navigate. Loaded as a separate module:
    <code>@xodesign/xoframe/lightbox</code>.</p>

    <div class="thumbs" id="gallery"></div>
  </main>

  <script src="../packages/core/dist/xoframe.min.js"></script>
  <script src="../packages/core/dist/xoframe-lightbox.min.js"></script>
  <script>
    const g = document.getElementById('gallery')
    for (let i = 1; i <= 8; i++) {
      g.insertAdjacentHTML('beforeend',
        `<a href="https://picsum.photos/seed/lb${i}/1400/1000" data-xo-lightbox="demo" data-caption="Photo ${i} of 8">
           <img data-xo data-src="https://picsum.photos/seed/lb${i}/400/280" data-color="hsl(${i*40},20%,80%)" width="400" height="280" alt="Photo ${i}">
         </a>`)
    }
    XOframe.init()      // lazy-load the thumbnails
    XOlightbox.init()   // wire up the lightbox
    document.addEventListener('keydown', e => { if (e.key === 'Escape') {} }) // native dialog handles Esc
  </script>
</body>
</html>
